{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div style="max-width: 400px; margin: 5rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 2rem; text-align: center;">Welcome <span class="gradient-text">Back</span></h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="{% url 'signup' %}" style="color: var(--primary-color);">Sign up here</a>
        </p>
    </div>
</div>

<style>
    /* Quick fix for crispy forms in our dark theme */
    label { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.3rem; display: block; }
    .invalid-feedback { color: var(--secondary-color); font-size: 0.75rem; }
    .help-text { display: none; }
</style>
{% endblock %}
